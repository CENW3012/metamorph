name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Install SDL3 with vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg integrate install
          .\vcpkg install sdl3:x64-windows sdl3-image:x64-windows

      - name: Create build directory
        run: mkdir build

      - name: Configure with CMake
        run: |
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake ..

      - name: Build Release
        run: |
          cd build
          cmake --build . --config Release

      - name: Copy assets to build output
        run: |
          xcopy assets build\Release\assets /E /I /Y
          xcopy scripts build\Release\scripts /E /I /Y

      - name: Copy SDL3 DLLs
        run: |
          copy vcpkg\installed\x64-windows\bin\SDL3.dll build\Release\
          copy vcpkg\installed\x64-windows\bin\SDL3_image.dll build\Release\

      - name: Create release package
        run: |
          cd build\Release
          7z a ../../horrorgame-windows.zip *

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: horrorgame-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
